<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Number Display</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f11;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
    }

    .card {
      text-align: center;
      background: #1a1a1f;
      border: 1px solid #2a2a35;
      border-radius: 20px;
      padding: 60px 80px;
      box-shadow: 0 0 60px rgba(88, 101, 242, 0.15);
    }

    .label {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #5865f2;
      margin-bottom: 20px;
      font-weight: 600;
    }

    #number {
      font-size: 120px;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #5865f2, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      min-width: 200px;
      display: inline-block;
      transition: opacity 0.2s;
    }

    #number.updating {
      opacity: 0.4;
    }

    .status {
      margin-top: 24px;
      font-size: 12px;
      color: #555;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }

    .dot.error {
      background: #ef4444;
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="label">Current Number</div>
    <div id="number">—</div>
    <div class="status">
      <div class="dot" id="dot"></div>
      <span id="status-text">Connecting...</span>
    </div>
  </div>

  <script>
    const numberEl = document.getElementById('number');
    const statusEl = document.getElementById('status-text');
    const dotEl = document.getElementById('dot');

    let lastNumber = null;

    async function fetchNumber() {
      try {
        // Cache-bust so GitHub Pages doesn't serve stale data
        const res = await fetch('./data.json?t=' + Date.now());
        if (!res.ok) throw new Error('Not found');

        const data = await res.json();

        if (data.number !== lastNumber) {
          numberEl.classList.add('updating');
          await new Promise(r => setTimeout(r, 150));
          numberEl.textContent = data.number;
          numberEl.classList.remove('updating');
          lastNumber = data.number;
        }

        dotEl.className = 'dot';
        const time = new Date(data.updated).toLocaleTimeString();
        statusEl.textContent = `Live · last set ${time}`;
      } catch {
        dotEl.className = 'dot error';
        statusEl.textContent = 'No number set yet — use /setnumber in Discord';
      }
    }

    fetchNumber();
    setInterval(fetchNumber, 3000);
  </script>
</body>
</html>
